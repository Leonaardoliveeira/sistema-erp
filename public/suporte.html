<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franquia ERP - Suporte</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body onload="verificarLogin(); carregarClientes(); mostrarUsuarioLogado();">

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="layers" class="logo-icon"></i>
                    <span>Franquia ERP</span>
                </div>
                <button class="theme-switch" onclick="toggleDark()">
                    <i data-lucide="moon"></i>
                </button>
            </div>

            <div class="user-profile">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=Leonardo&background=0D8ABC&color=fff" alt="Avatar"
                        id="userAvatar">
                </div>
                <div class="user-info">
                    <span class="user-name" id="usuarioLogado">Leonardo Silva</span>
                    <span class="user-role">Administrador</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-group">
                    <span class="nav-title">Gestão</span>
                    <a href="dashboard.html" class="nav-item">
                        <i data-lucide="layout-dashboard"></i> Dashboard
                    </a>
                    <a href="cadastro.html" class="nav-item">
                        <i data-lucide="user-plus"></i> Cadastro de Cliente
                    </a>
                </div>

                <div class="nav-group">
                    <span class="nav-title">Operacional</span>
                    <a href="clientes.html" class="nav-item">
                        <i data-lucide="file-text"></i> Gerenciamento Sped
                    </a>
                    <a href="usuarios.html" id="menuUsuarios" class="nav-item">
                        <i data-lucide="users"></i> Usuários
                    </a>
                </div>

                <div class="nav-group">
                    <span class="nav-title">Ajuda</span>
                    <a href="suporte.html" class="nav-item active">
                        <i data-lucide="help-circle"></i> Suporte
                    </a>
                </div>

                <div class="nav-footer">
                    <a href="#" onclick="logout()" class="nav-item logout">
                        <i data-lucide="log-out"></i> Sair
                    </a>
                </div>
            </nav>
        </div>
    </aside>

    <!-- CONTEÚDO -->

    <div class="main">

        <div class="topbar">
            <h2>Gerenciamento de Suporte Remoto</h2>
        </div>

        <!-- BUSCA -->

        <div class="suporte-search">

            <input type="text" id="buscar" placeholder="🔎 Buscar cliente..." onkeyup="filtrarClientes()">

        </div>

        <!-- LISTA CLIENTES -->

        <div id="listaClientes" class="clientes-grid"></div>

    </div>

    <script>
        // Inicializa os ícones Lucide
        lucide.createIcons();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        function toggleSidebar() {

            document.getElementById("sidebar").classList.toggle("active")

        }

        document.querySelectorAll('.sidebar a').forEach(link => {

            link.addEventListener('click', () => {

                document.getElementById('sidebar').classList.remove('active')

            })

        })

    </script>

    <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
    <script src="js/suporte.js"></script>

    <!-- 🔥 LOADING -->
    <div id="loading">
        <div class="spinner"></div>
    </div>   

</body>

</html>
