<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franquia ERP - Acesso Remoto</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="verificarLogin(); listarUsuarios();">

    <!-- BOTÃO MENU MOBILE -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <h2>Franquia ERP</h2>

        <a href="dashboard.html"><i>📊 </i>Dashboard</a>
        <a href="cadastro.html"><i>✍ </i>Cadastro de Clientes</a>
        <a href="clientes.html"><i>🤝 </i>Lista de Clientes</a>
        <a href="usuarios.html" id="menuUsuarios"><i>👨‍💼 </i>Cadastro de Usuários</a>
        <a href="suporte.html"><i>🆘 </i>Suporte ao Cliente</a>
        <a href="#" onclick="logout()"><i>🔒 </i>Sair</a>

    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <h2>Acesso Remoto</h2>
        </div>

        <!-- BUSCA -->
        <div class="form-box">

            <h3>Acesso remoto</h3>

            <input 
                type="text" 
                id="buscar" 
                placeholder="Buscar cliente..."
                autocomplete="off"
            >

        </div>

        <!-- LISTA DE CLIENTES -->
        <div id="listaClientes"></div>

    </div>

    <!-- SCRIPT MENU MOBILE -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('active');
            });
        });
    </script>

    <!-- SCRIPTS DO SISTEMA -->
    <script src="js/auth.js"></script>
    <script src="js/suporte.js"></script>

</body>

</html>
