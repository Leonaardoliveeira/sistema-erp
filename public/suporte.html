<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Suporte Técnico</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:20px;
}

h1{
margin-bottom:20px;
}

#buscar{
width:300px;
padding:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;
}

.cliente{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.cliente h3{
margin:0 0 10px 0;
}

.acesso{
display:flex;
align-items:center;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}

.acesso:last-child{
border-bottom:none;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.btnConectar{
background:#2ecc71;
color:white;
}

.btnCopiar{
background:#3498db;
color:white;
margin-left:5px;
}

</style>

</head>

<body>

<h1>Suporte Técnico</h1>

<input type="text" id="buscar" placeholder="Buscar cliente...">

<div id="listaClientes"></div>

<script src="js/suporte.js"></script>

</body>

</html>
