<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franquia ERP - Acesso Remoto</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="verificarLogin(); listarUsuarios();">

    <!-- Botão Mobile -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <h2>Franquia ERP</h2>
        </div>

        <nav class="menu">

            <a href="dashboard.html">
                <span>📊</span>
                Dashboard
            </a>

            <a href="cadastro.html">
                <span>✍</span>
                Cadastro de Clientes
            </a>

            <a href="clientes.html">
                <span>🤝</span>
                Lista de Clientes
            </a>

            <a href="usuarios.html" id="menuUsuarios">
                <span>👨‍💼</span>
                Cadastro de Usuários
            </a>

            <a href="suporte.html" class="active">
                <span>🆘</span>
                Suporte ao Cliente
            </a>

            <a href="#" onclick="logout()" class="logout">
                <span>🔒</span>
                Sair
            </a>

        </nav>

    </aside>

    <!-- Conteúdo principal -->
    <main class="main-content">

        <header class="page-header">
            <h1>Acesso Remoto</h1>
            <p>Gerenciamento de acessos para suporte aos clientes</p>
        </header>

        <section class="search-box">

            <label for="buscar">Buscar cliente</label>

            <input type="text" id="buscar" placeholder="Digite o nome do cliente..." autocomplete="off">

        </section>

        <section class="clientes-container">

            <div id="listaClientes"></div>

        </section>

    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('active');
            });
        });
    </script>

    <script src="js/auth.js"></script>
    <script src="js/suporte.js"></script>

</body>

</html>
