<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franquia ERP - Acesso Remoto</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="verificarLogin(); listarUsuarios();">

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="sidebar">
        <h2>Franquia ERP</h2>
        <a href="dashboard.html"><i>📊 </i>Dashboard</a>
        <a href="cadastro.html"><i>✍ </i>Cadastro de Clientes</a>
        <a href="clientes.html"><i>🤝 </i>Lista de Clientes</a>
        <a href="usuarios.html" id="menuUsuarios"><i>👨‍💼 </i>Cadastro de Usuários</a>
        <a href="suporte.html"><i>🆘 </i>Suporte ao cliente</a>
        <a href="#" onclick="logout()"><i>🔒 </i>Sair</a>
    </div>


    <h1>Suporte Técnico</h1>

    <input type="text" id="buscar" placeholder="Buscar cliente...">

    <div id="listaClientes"></div>
    <script>
        // Função para abrir/fechar menu no mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        // Fecha o menu automaticamente ao clicar em um link no mobile
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('active');
            });
        });
    </script>

    <script src="js/auth.js"></script>
    <script src="js/suporte.js"></script>

</body>

</html>
