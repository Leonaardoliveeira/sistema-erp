<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franquia ERP - Suporte</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/suporte.css">

</head>

<body onload="verificarLogin(); carregarClientes(); mostrarUsuarioLogado();">

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->

    <div class="sidebar" id="sidebar">
        <h2>Franquia ERP <button onclick="toggleDark()">🌙</button>
            <div id="usuarioLogado" style="margin-top:10px; font-size:14px;"></div>
        </h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="cadastro.html">✍ Cadastro de Clientes</a>
        <a href="clientes.html">📝 Gerenciamento Sped</a>
        <a href="usuarios.html" id="menuUsuarios">👨‍💼 Cadastro de Usuários</a>
        <a href="suporte.html">🆘 Suporte ao cliente</a>
        <a href="#" onclick="logout()">🔒 Sair</a>

    </div>

    <!-- CONTEÚDO -->

    <div class="main">

        <div class="topbar">
            <h2>Gerenciamento de Suporte Remoto</h2>
        </div>

        <!-- BUSCA -->

        <div class="suporte-search">

            <input type="text" id="buscar" placeholder="🔎 Buscar cliente..." onkeyup="filtrarClientes()">

        </div>

        <!-- LISTA CLIENTES -->

        <div id="listaClientes" class="clientes-grid"></div>

    </div>

    <script>

        function toggleSidebar() {

            document.getElementById("sidebar").classList.toggle("active")

        }

        document.querySelectorAll('.sidebar a').forEach(link => {

            link.addEventListener('click', () => {

                document.getElementById('sidebar').classList.remove('active')

            })

        })

    </script>

    <script src="js/auth.js"></script>
    <script src="js/suporte.js"></script>

</body>

</html>
