<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Franquia ERP - Cadastro de Cliente</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="verificarLogin();">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

  <div class="sidebar" id="sidebar">
    <h2>Franquia ERP</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="cadastro.html">✍ Cadastro de Clientes</a>
    <a href="clientes.html">🤝 Lista de Clientes</a>
    <a href="usuarios.html" id="menuUsuarios" style="display:none;">👨‍💼 Cadastro de Usuários</a>
    <a href="suporte.html">🆘 Suporte ao Cliente</a>
    <a href="#" onclick="logout()">🔒 Sair</a>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Novo Cliente</h2>
    </div>

    <div class="container-cadastro">

      <!-- CADASTRO DO CLIENTE -->
      <div class="form-box">
        <h3 style="text-align: center; margin-bottom: 20px;">Cadastro</h3>

        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="documento" placeholder="CPF/CNPJ">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="telefone" placeholder="Telefone">

        <select id="regime">
          <option value="">Selecione o Regime</option>
          <option value="Simples Nacional">Simples Nacional</option>
          <option value="Lucro Presumido">Lucro Presumido</option>
          <option value="Lucro Real">Lucro Real</option>
          <option value="MEI">MEI</option>
        </select>

        <button class="btn-primary" onclick="salvarCliente()">Salvar Cliente</button>
      </div>

      <!-- ACESSO REMOTO -->
      <div class="acesso-remoto">

        <h3 style="text-align:center;margin-bottom:20px;">Acesso Remoto</h3>

        <div class="acesso">
          <input id="nome1" placeholder="Nome máquina">
          <input id="anydesk1" placeholder="ID AnyDesk">
        </div>

        <div class="acesso">
          <input id="nome2" placeholder="Nome máquina">
          <input id="anydesk2" placeholder="ID AnyDesk">
        </div>

        <div class="acesso">
          <input id="nome3" placeholder="Nome máquina">
          <input id="anydesk3" placeholder="ID AnyDesk">
        </div>

        <div class="acesso">
          <input id="nome4" placeholder="Nome máquina">
          <input id="anydesk4" placeholder="ID AnyDesk">
        </div>

        <div class="acesso">
          <input id="nome5" placeholder="Nome máquina">
          <input id="anydesk5" placeholder="ID AnyDesk">
        </div>

      </div>

    </div>
  </div>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/clientes.js"></script>
</body>

</html>
