<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Franquia ERP - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="verificarLogin(); carregarDashboard();">

  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

  <div class="sidebar" id="sidebar">
    <h2>Franquia ERP Soluções</h2>
    <a href="dashboard.html"><a>📊 </a>Dashboard</a>
    <a href="cadastro.html"><a>✍ </a>Cadastro de Cliente</a>
    <a href="clientes.html"><a>🤝 </a>Lista de Clientes</a>  
    <a href="usuarios.html" id="menuUsuarios"><a>👨‍💼 </a>Cadastro de Usuários</a>  
    <a href="#" onclick="logout()"><a>🔒 </a>Sair</a>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Resumo Mensal</h2>
    </div>

    <div class="cards">
      <div class="card" onclick="filtrarPorStatus('Pendente')">
        <h3>Pendentes</h3>
        <p id="pendentes">0</p>
      </div>

      <div class="card" onclick="filtrarPorStatus('Enviado')">
        <h3>Enviados</h3>
        <p id="enviados">0</p>
      </div>

      <div class="card" onclick="filtrarPorStatus('Gerado')">
        <h3>Gerados</h3>
        <p id="gerados">0</p>
      </div>

      <div class="card" onclick="filtrarPorStatus('Erro')">
        <h3>Erros</h3>
        <p id="erros">0</p>
      </div>
    </div>

    <div class="form-box" style="margin-top:30px;">
      <h3>Pesquisar Clientes</h3>
      <input type="text" id="campoPesquisa" placeholder="Nome, Documento ou Telefone..." onkeyup="filtrarClientes()">
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Documento</th>
            <th>Regime</th>
            <th>Telefone</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabelaDashboard"></tbody>
      </table>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('active');
    }

    document.querySelectorAll('.sidebar a').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('active');
      });
    });
  </script>

  <script src="js/auth.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
